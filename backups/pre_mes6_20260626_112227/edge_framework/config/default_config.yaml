# EdgeFramework — Configuración completa
# Todo configurable aquí sin tocar código

framework:
  name: "EdgeFramework"
  version: "0.2.0"
  mode: "live"          # live | shadow | paper
  interval_seconds: 30
  log_level: "INFO"
  log_path: "logs"

# Conector de broker
connector:
  type: "mt5"           # mt5 | topstep | paper | shadow_edgefix | shadow_demo2
  symbols:
    - "XAUUSD"
    - "US30.cash"
    - "US100.cash"
  instrument_map:
    XAUUSD: "XAUUSD"
    US30: "US30.cash"
    US100: "US100.cash"
    XAGUSD: "XAGUSD"
  mt5:
    login: 0
    password: ""
    server: "FTMO-Demo"
    terminal_path: "C:\\Program Files\\FTMO Global Markets MT5 Terminal\\terminal64.exe"
  topstep:
    username: ""
    api_key: ""
    account_id: ""
    instrument_map:
      XAUUSD: "MGC"
      US30: "MYM"
      US100: "MNQ"
      XAGUSD: "SIL"

# Gestión de riesgo
risk:
  risk_per_trade: 0.01        # 1% por trade
  max_daily_drawdown: 0.05    # 5% DD máximo diario
  max_trades_per_day: 10
  circuit_breaker_pct: 0.08   # para todo si -8%
  min_volume: 0.01
  max_volume: 10.0

# Auditoría
audit:
  enabled: true
  log_path: "logs"
  signals_file: "signals_audit.jsonl"
  trades_file: "trades_audit.jsonl"
  summary_file: "daily_summary.jsonl"

# Health check
health:
  max_cycle_seconds: 35
  slow_cycles_alert: 3